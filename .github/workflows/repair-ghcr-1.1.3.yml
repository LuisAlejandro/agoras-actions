name: Repair GHCR 1.1.3 image

# Restores ghcr.io/luisalejandro/agoras-actions:1.1.3 from git tag 1.1.3 after the
# 2026-06-20 accidental overwrite (2.0 execute.py + agoras==1.1.3).
on:
  workflow_dispatch:

concurrency:
  group: repair-ghcr-1.1.3
  cancel-in-progress: false

jobs:
  restore:
    name: Restore agoras-actions 1.1.3 image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release tag 1.1.3
        uses: actions/checkout@v7
        with:
          ref: refs/tags/1.1.3

      - name: Verify consistent 1.1.3 docker stack
        run: |
          grep -Fq 'agoras==1.1.3' docker/Dockerfile
          grep -Fq "chain(['publish']" docker/execute.py
          ! grep -Fq 'normalize_network' docker/execute.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github Packages registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push restored 1.1.3 image
        uses: docker/build-push-action@v7
        with:
          tags: ghcr.io/luisalejandro/agoras-actions:1.1.3
          file: docker/Dockerfile
          context: docker
          push: true
          load: false
