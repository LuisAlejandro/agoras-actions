name: Pull Request

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened
    branches:
      - develop

jobs:
  checks:
    name: Repository Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tox and run unit tests
        run: |
          python3 -m pip install -r requirements-dev.txt
          tox -e coverage

      - name: Set environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          echo "PROJECT_NAME=agoras-actions" >> $GITHUB_ENV

      - name: Prepare CI environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Build release pipeline
        run: |
          make image
          make dependencies
          make build

      - name: Smoke test container
        run: docker run --rm luisalejandro/agoras-actions:latest test

      - name: Tear down Docker
        if: always()
        run: make down

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Semgrep scan
        run: |
          BASELINE="${{ github.event.pull_request.base.sha }}"
          semgrep scan \
            --config p/ci \
            --config p/python \
            --baseline-commit "${BASELINE}" \
            --metrics=off \
            --error
