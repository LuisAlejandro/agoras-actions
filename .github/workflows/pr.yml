name: Pull Request

on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened
    branches:
      - develop

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout agoras-actions
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Run execute.py unit tests
        run: |
          cd docker
          python3 -m unittest test_execute.py -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          tags: agoras-actions:pr-test
          file: docker/Dockerfile
          context: docker
          load: true
          push: false

      - name: Smoke test container
        run: docker run --rm agoras-actions:pr-test test

  approve:
    name: Approve pull request
    runs-on: ubuntu-22.04
    needs: test
    if: github.actor == github.repository_owner || github.actor == 'dependabot[bot]'
    steps:
      - name: Approve
        uses: hmarr/auto-approve-action@v4.0.0
        with:
          github-token: "${{ github.actor == github.repository_owner && secrets.GITHUB_TOKEN || secrets.REPO_PERSONAL_ACCESS_TOKEN }}"

  merge:
    name: Merge pull request
    runs-on: ubuntu-22.04
    needs: approve
    if: github.actor == github.repository_owner || github.actor == 'dependabot[bot]'
    steps:
      - name: Merge
        uses: actions/github-script@v9
        with:
          github-token: "${{ github.actor == github.repository_owner && secrets.GITHUB_TOKEN || secrets.REPO_PERSONAL_ACCESS_TOKEN }}"
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            })
