name: Pull Request

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened
    branches:
      - develop

jobs:
  checks:
    name: Repository Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Run execute.py unit tests
        run: |
          cd docker
          python3 -m unittest test_execute.py -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          tags: agoras-actions:pr-test
          file: docker/Dockerfile
          context: docker
          load: true
          push: false

      - name: Smoke test container
        run: docker run --rm agoras-actions:pr-test test

  # >>> rosey-maintainer:ci-quality BEGIN
  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semgrep scan
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            BASELINE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.repository.default_branch }}"
            git config --global --add safe.directory "$(pwd)"
            git fetch origin "${BASE}"
            BASELINE="$(git merge-base HEAD "origin/${BASE}")"
          fi
          semgrep scan \
            --config p/ci \
            --config p/python \
            --baseline-commit "${BASELINE}" \
            --metrics=off \
            --error
  # <<< rosey-maintainer:ci-quality END
