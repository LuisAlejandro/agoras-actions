[bumpversion]
current_version = 2.0.1
commit = True
tag = True
tag_name = {new_version}

[bumpversion:file:README.md]
search = Current version: {current_version}
replace = Current version: {new_version}

[bumpversion:file:action.yml]
search = ghcr.io/luisalejandro/agoras-actions:{current_version}
replace = ghcr.io/luisalejandro/agoras-actions:{new_version}

[bumpversion:file:docker/Dockerfile]
search = agoras=={current_version}
replace = agoras=={new_version}

[bumpversion:file:Dockerfile]
search = agoras=={current_version}
replace = agoras=={new_version}

[bumpversion:file:Makefile]
search = agoras=={current_version}
replace = agoras=={new_version}

[bumpversion:file:.github/workflows/push.yml]
search = ghcr.io/luisalejandro/agoras-actions:{current_version}
replace = ghcr.io/luisalejandro/agoras-actions:{new_version}
