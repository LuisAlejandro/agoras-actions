name: agoras-actions
author: Luis Alejandro Martínez Faneyth
description: Agoras helps publish, like, share and delete posts on social networks (Agoras 2.0 native CLI). Also supports standalone OAuth credential refresh to GitHub secrets.
inputs:
  network:
    description: 'Target platform for social actions. One of: x, facebook, instagram, linkedin, discord, youtube, tiktok, threads, telegram, whatsapp. Legacy value twitter is mapped to x. Optional when action is refresh-credentials (may be used as an additional platform filter).'
    required: false
  action:
    description: 'Action to execute. One of: post, like, share, delete, video, template, refresh-credentials.'
    required: true
  github-secret-update-token:
    description: PAT or GitHub App token with repository secrets write permission. Required when any *-refresh-token-secret-name input is set.
    required: false
  platforms:
    description: 'Comma-separated platforms to refresh (youtube, facebook, instagram, linkedin, tiktok, threads). Defaults to all configured platforms when omitted.'
    required: false
  youtube-refresh-token-secret-name:
    description: GitHub repository secret name to update with the refreshed YouTube refresh token.
    required: false
  facebook-refresh-token-secret-name:
    description: GitHub repository secret name to update with the refreshed Facebook refresh token.
    required: false
  instagram-refresh-token-secret-name:
    description: GitHub repository secret name to update with the refreshed Instagram refresh token.
    required: false
  linkedin-refresh-token-secret-name:
    description: GitHub repository secret name to update with the refreshed LinkedIn refresh token.
    required: false
  tiktok-refresh-token-secret-name:
    description: GitHub repository secret name to update with the refreshed TikTok refresh token.
    required: false
  threads-refresh-token-secret-name:
    description: GitHub repository secret name to update with the refreshed Threads refresh token.
    required: false
  text:
    description: Text content to publish.
    required: false
  link:
    description: URL link to include in the post.
    required: false
  image-1:
    description: First image URL.
    required: false
  image-2:
    description: Second image URL.
    required: false
  image-3:
    description: Third image URL.
    required: false
  image-4:
    description: Fourth image URL.
    required: false
  post-id:
    description: Post ID for like, share, or delete actions (comma-separated for multiple).
    required: false
  profile-id:
    description: Profile ID for share actions (Facebook).
    required: false
  video-url:
    description: Video file URL for video actions.
    required: false
  video-title:
    description: Video title or caption.
    required: false
  video-description:
    description: Video description.
    required: false
  video-type:
    description: Video type (platform-specific).
    required: false
  video-caption:
    description: Video caption (Instagram).
    required: false
  title:
    description: Title (YouTube, TikTok).
    required: false
  description:
    description: Description (YouTube).
    required: false
  category-id:
    description: YouTube category ID.
    required: false
  privacy:
    description: Privacy setting (YouTube, TikTok).
    required: false
  keywords:
    description: Comma-separated YouTube keywords.
    required: false
  x-consumer-key:
    description: X API consumer key.
    required: false
  x-consumer-secret:
    description: X API consumer secret.
    required: false
  x-oauth-token:
    description: X OAuth token.
    required: false
  x-oauth-secret:
    description: X OAuth secret.
    required: false
  facebook-client-id:
    description: Facebook OAuth client ID.
    required: false
  facebook-client-secret:
    description: Facebook OAuth client secret.
    required: false
  facebook-app-id:
    description: Facebook App ID.
    required: false
  facebook-object-id:
    description: Facebook page or profile ID.
    required: false
  facebook-refresh-token:
    description: Facebook OAuth refresh token (unattended CI).
    required: false
  instagram-client-id:
    description: Instagram (Facebook) OAuth client ID.
    required: false
  instagram-client-secret:
    description: Instagram (Facebook) OAuth client secret.
    required: false
  instagram-object-id:
    description: Instagram business account ID.
    required: false
  instagram-refresh-token:
    description: Instagram OAuth refresh token (unattended CI).
    required: false
  linkedin-client-id:
    description: LinkedIn OAuth client ID.
    required: false
  linkedin-client-secret:
    description: LinkedIn OAuth client secret.
    required: false
  linkedin-object-id:
    description: LinkedIn user or organization ID.
    required: false
  linkedin-refresh-token:
    description: LinkedIn OAuth refresh token (unattended CI).
    required: false
  discord-bot-token:
    description: Discord bot token.
    required: false
  discord-server-name:
    description: Discord server (guild) name.
    required: false
  discord-channel-name:
    description: Discord channel name.
    required: false
  youtube-client-id:
    description: YouTube (Google) OAuth client ID.
    required: false
  youtube-client-secret:
    description: YouTube (Google) OAuth client secret.
    required: false
  youtube-refresh-token:
    description: YouTube OAuth refresh token (unattended CI).
    required: false
  tiktok-client-key:
    description: TikTok App client key.
    required: false
  tiktok-client-secret:
    description: TikTok App client secret.
    required: false
  tiktok-username:
    description: TikTok username.
    required: false
  tiktok-refresh-token:
    description: TikTok OAuth refresh token (unattended CI).
    required: false
  threads-app-id:
    description: Threads (Meta) App ID.
    required: false
  threads-app-secret:
    description: Threads (Meta) App secret.
    required: false
  threads-refresh-token:
    description: Threads OAuth refresh token (unattended CI).
    required: false
  threads-user-id:
    description: Threads user ID (unattended CI).
    required: false
  telegram-bot-token:
    description: Telegram bot token.
    required: false
  telegram-chat-id:
    description: Telegram chat ID.
    required: false
  telegram-parse-mode:
    description: 'Telegram parse mode: HTML, Markdown, MarkdownV2, or None.'
    required: false
  whatsapp-access-token:
    description: WhatsApp Business API access token.
    required: false
  whatsapp-phone-number-id:
    description: WhatsApp Business phone number ID.
    required: false
  whatsapp-business-account-id:
    description: WhatsApp Business Account ID.
    required: false
  whatsapp-recipient:
    description: WhatsApp recipient phone number (E.164).
    required: false
  whatsapp-template-name:
    description: WhatsApp pre-approved template name.
    required: false
  whatsapp-template-language:
    description: WhatsApp template language code (ISO 639-1).
    required: false
  whatsapp-template-components:
    description: WhatsApp template components as JSON string.
    required: false

outputs:
  result:
    description: Comma-separated list of published or affected post IDs.

runs:
  using: docker
  image: docker://ghcr.io/luisalejandro/agoras-actions:2.0.5
  args:
    - network="${{ inputs.network }}"
    - action="${{ inputs.action }}"
    - github-secret-update-token="${{ inputs.github-secret-update-token }}"
    - platforms="${{ inputs.platforms }}"
    - youtube-refresh-token-secret-name="${{ inputs.youtube-refresh-token-secret-name }}"
    - facebook-refresh-token-secret-name="${{ inputs.facebook-refresh-token-secret-name }}"
    - instagram-refresh-token-secret-name="${{ inputs.instagram-refresh-token-secret-name }}"
    - linkedin-refresh-token-secret-name="${{ inputs.linkedin-refresh-token-secret-name }}"
    - tiktok-refresh-token-secret-name="${{ inputs.tiktok-refresh-token-secret-name }}"
    - threads-refresh-token-secret-name="${{ inputs.threads-refresh-token-secret-name }}"
    - text="${{ inputs.text }}"
    - link="${{ inputs.link }}"
    - image-1="${{ inputs.image-1 }}"
    - image-2="${{ inputs.image-2 }}"
    - image-3="${{ inputs.image-3 }}"
    - image-4="${{ inputs.image-4 }}"
    - post-id="${{ inputs.post-id }}"
    - profile-id="${{ inputs.profile-id }}"
    - video-url="${{ inputs.video-url }}"
    - video-title="${{ inputs.video-title }}"
    - video-description="${{ inputs.video-description }}"
    - video-type="${{ inputs.video-type }}"
    - video-caption="${{ inputs.video-caption }}"
    - title="${{ inputs.title }}"
    - description="${{ inputs.description }}"
    - category-id="${{ inputs.category-id }}"
    - privacy="${{ inputs.privacy }}"
    - keywords="${{ inputs.keywords }}"
    - x-consumer-key="${{ inputs.x-consumer-key }}"
    - x-consumer-secret="${{ inputs.x-consumer-secret }}"
    - x-oauth-token="${{ inputs.x-oauth-token }}"
    - x-oauth-secret="${{ inputs.x-oauth-secret }}"
    - facebook-client-id="${{ inputs.facebook-client-id }}"
    - facebook-client-secret="${{ inputs.facebook-client-secret }}"
    - facebook-app-id="${{ inputs.facebook-app-id }}"
    - facebook-object-id="${{ inputs.facebook-object-id }}"
    - facebook-refresh-token="${{ inputs.facebook-refresh-token }}"
    - instagram-client-id="${{ inputs.instagram-client-id }}"
    - instagram-client-secret="${{ inputs.instagram-client-secret }}"
    - instagram-object-id="${{ inputs.instagram-object-id }}"
    - instagram-refresh-token="${{ inputs.instagram-refresh-token }}"
    - linkedin-client-id="${{ inputs.linkedin-client-id }}"
    - linkedin-client-secret="${{ inputs.linkedin-client-secret }}"
    - linkedin-object-id="${{ inputs.linkedin-object-id }}"
    - linkedin-refresh-token="${{ inputs.linkedin-refresh-token }}"
    - discord-bot-token="${{ inputs.discord-bot-token }}"
    - discord-server-name="${{ inputs.discord-server-name }}"
    - discord-channel-name="${{ inputs.discord-channel-name }}"
    - youtube-client-id="${{ inputs.youtube-client-id }}"
    - youtube-client-secret="${{ inputs.youtube-client-secret }}"
    - youtube-refresh-token="${{ inputs.youtube-refresh-token }}"
    - tiktok-client-key="${{ inputs.tiktok-client-key }}"
    - tiktok-client-secret="${{ inputs.tiktok-client-secret }}"
    - tiktok-username="${{ inputs.tiktok-username }}"
    - tiktok-refresh-token="${{ inputs.tiktok-refresh-token }}"
    - threads-app-id="${{ inputs.threads-app-id }}"
    - threads-app-secret="${{ inputs.threads-app-secret }}"
    - threads-refresh-token="${{ inputs.threads-refresh-token }}"
    - threads-user-id="${{ inputs.threads-user-id }}"
    - telegram-bot-token="${{ inputs.telegram-bot-token }}"
    - telegram-chat-id="${{ inputs.telegram-chat-id }}"
    - telegram-parse-mode="${{ inputs.telegram-parse-mode }}"
    - whatsapp-access-token="${{ inputs.whatsapp-access-token }}"
    - whatsapp-phone-number-id="${{ inputs.whatsapp-phone-number-id }}"
    - whatsapp-business-account-id="${{ inputs.whatsapp-business-account-id }}"
    - whatsapp-recipient="${{ inputs.whatsapp-recipient }}"
    - whatsapp-template-name="${{ inputs.whatsapp-template-name }}"
    - whatsapp-template-language="${{ inputs.whatsapp-template-language }}"
    - whatsapp-template-components="${{ inputs.whatsapp-template-components }}"

branding:
  icon: share-2
  color: white
